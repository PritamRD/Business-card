* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0a; display: flex; justify-content: center; min-height: 100vh; padding: 2rem 1rem; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; }
.card { width: 100%; max-width: 400px; background: #0d0d0d; border-radius: 20px; overflow: hidden; border: 0.5px solid #2a2a2a; align-self: flex-start; }

.photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
.name { font-size: 22px; font-weight: 700; color: #f0f0f0; letter-spacing: -0.02em; margin-bottom: 3px; }
.role { font-size: 12px; color: #888; margin-bottom: 3px; }
.company { font-size: 11px; color: #c8a030; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; }
.card-body { padding: 0.75rem 1.5rem; }
.row { display: flex; align-items: center; gap: 14px; padding: 11px 0; border-bottom: 0.5px solid #1c1c1c; text-decoration: none; }
.row:last-child { border-bottom: none; }
.icon-box { width: 36px; height: 36px; border-radius: 9px; background: #1a1a1a; border: 0.5px solid #2a2a2a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; }
.row-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 2px; }
.row-val { font-size: 13px; color: #ccc; }
.card-footer { padding: 1rem 1.5rem 1.5rem; border-top: 0.5px solid #1e1e1e; display: flex; gap: 10px; }
.btn { flex: 1; padding: 11px 0; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; }
.btn-gold { background: linear-gradient(135deg, #c8a030, #f0c84a); color: #0d0d0d; }
